# render.yaml — Render.com deployment config
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: neet-ctk-ignition
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: neet-ctk-db
          property: connectionString

databases:
  - name: neet-ctk-db
    databaseName: neetctk
    plan: free          # upgrade to starter ($7/mo) for production persistence
